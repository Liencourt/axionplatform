{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <title>Login | Axiom Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'css/app.min.css' %}" rel="stylesheet" />
    <style>
        :root {
            --cor-principal: #0d6efd; /* Cole a mesma cor da Landing Page aqui */
        }
        .auth-bg { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 450px; background: #fff; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; }
        
        .btn-axiom-principal {
            background-color: var(--cor-principal);
            color: #ffffff;
            border: none;
            transition: opacity 0.3s;
        }
        .btn-axiom-principal:hover {
            opacity: 0.85;
            color: #ffffff;
        }
    </style>
</head>
<body class="auth-bg">

    <div class="auth-card">
        <div class="p-5">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary mb-1">AXIOM PLATFORM</h3>
                <p class="text-muted small">Scientific Intelligence for Executive Decisions</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger py-2 text-center small">Usuário ou senha incorretos. Tente novamente.</div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold">E-mail corporativo</label>
                    <input type="text" name="username" class="form-control" placeholder="executivo@empresa.com" required autofocus>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-bold">Senha</label>
                        <a href="#" class="text-muted small">Esqueceu a senha?</a>
                    </div>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="d-grid mb-3">
                   <button class="btn btn-axiom-principal btn-lg fw-bold" type="submit">Entrar na Plataforma</button>
                </div>
                
                <input type="hidden" name="next" value="{% url 'lista_projetos' %}" />
            </form>
        </div>
        <div class="bg-light text-center py-3">
            <p class="text-muted mb-0 small">Axiom Engine &copy; {% now "Y" %}. Todos os direitos reservados.</p>
        </div>
    </div>

</body>
</html>
